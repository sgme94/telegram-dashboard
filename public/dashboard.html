<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目状态监控面板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 3em;
            font-weight: bold;
            color: #333;
        }
        
        .stat-card .trend {
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        .trend.up { color: #10b981; }
        .trend.down { color: #ef4444; }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .chart-card h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        
        .projects-table {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow-x: auto;
        }
        
        .projects-table h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }
        
        .status-active {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-paused {
            background: #fef3c7;
            color: #92400e;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        
        .refresh-btn:hover {
            transform: rotate(180deg);
        }
        
        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .cache-controls {
            position: fixed;
            bottom: 100px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        
        .cache-btn {
            background: white;
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 0.9em;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .cache-btn:hover {
            background: #667eea;
            color: white;
            transform: translateX(-5px);
        }
        
        .cache-btn.danger:hover {
            background: #ef4444;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2em;
        }
        
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧬 项目状态监控面板</h1>
            <p>OpenClaw 项目状态数据库实时统计</p>
            <p id="lastUpdate">更新时间：--</p>
        </header>
        
        <div id="loading" class="loading">
            加载中...
        </div>
        
        <div id="content" style="display: none;">
            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>项目总数</h3>
                    <div class="value" id="totalProjects">-</div>
                    <div class="trend" id="projectsTrend">-</div>
                </div>
                
                <div class="stat-card">
                    <h3>任务总数</h3>
                    <div class="value" id="totalTasks">-</div>
                    <div class="trend" id="tasksTrend">-</div>
                </div>
                
                <div class="stat-card">
                    <h3>完成率</h3>
                    <div class="value" id="completionRate">-</div>
                    <div class="trend" id="completionTrend">-</div>
                </div>
                
                <div class="stat-card">
                    <h3>进化次数</h3>
                    <div class="value" id="totalEvolutions">-</div>
                    <div class="trend" id="evolutionsTrend">-</div>
                </div>
            </div>
            
            <!-- 图表 -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>📊 任务状态分布</h3>
                    <canvas id="tasksChart"></canvas>
                </div>
                
                <div class="chart-card">
                    <h3>📈 进化趋势 (近 7 天)</h3>
                    <canvas id="evolutionsChart"></canvas>
                </div>
                
                <div class="chart-card">
                    <h3>⚡ 执行时间趋势</h3>
                    <canvas id="executionTimeChart"></canvas>
                </div>
                
                <div class="chart-card">
                    <h3>🎯 项目任务完成度</h3>
                    <canvas id="projectsChart"></canvas>
                </div>
            </div>
            
            <!-- 项目列表 -->
            <div class="projects-table">
                <h3>📁 项目详情</h3>
                <table>
                    <thead>
                        <tr>
                            <th>项目</th>
                            <th>描述</th>
                            <th>状态</th>
                            <th>任务进度</th>
                            <th>进化次数</th>
                        </tr>
                    </thead>
                    <tbody id="projectsTableBody">
                        <!-- 动态填充 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="cache-controls">
            <button class="cache-btn" onclick="forceRefreshCache()" title="强制刷新缓存 (Ctrl+F5)">
                🧹 清除缓存并刷新
            </button>
            <button class="cache-btn danger" onclick="hardReload()" title="硬重载 (跳过所有缓存)">
                ⚡ 硬重载
            </button>
        </div>
        
        <button class="refresh-btn" onclick="loadData()" title="刷新数据">🔄</button>
    </div>
    
    <script>
        // 图表实例
        let tasksChart, evolutionsChart, executionTimeChart, projectsChart;
        
        // 加载数据
        async function loadData() {
            const refreshBtn = document.querySelector('.refresh-btn');
            refreshBtn.classList.add('spinning');
            
            try {
                // 添加时间戳参数防止缓存
                const timestamp = Date.now();
                
                // 在实际使用中，这里会调用 API 获取数据
                // 由于是静态 HTML，我们使用模拟数据演示
                // 实际部署时需要后端 API 支持
                
                const stats = await fetchStats(timestamp);
                updateUI(stats);
                
                document.getElementById('lastUpdate').textContent = 
                    '更新时间：' + new Date().toLocaleString('zh-CN');
            } catch (e) {
                console.error('加载数据失败:', e);
                document.getElementById('loading').textContent = '加载失败：' + e.message;
            } finally {
                setTimeout(() => {
                    refreshBtn.classList.remove('spinning');
                }, 1000);
            }
        }
        
        // 获取统计数据 (真实 API)
        async function fetchStats(timestamp) {
            const cacheBuster = '?_t=' + timestamp;
            
            const [statsRes, projectsRes, evolutionsRes, executionRes] = await Promise.all([
                fetch('/api/stats' + cacheBuster, { cache: 'no-store' }),
                fetch('/api/projects' + cacheBuster, { cache: 'no-store' }),
                fetch('/api/evolutions-trend?days=7' + cacheBuster, { cache: 'no-store' }),
                fetch('/api/execution-time-trend?days=7' + cacheBuster, { cache: 'no-store' })
            ]);
            
            const stats = await statsRes.json();
            const projects = await projectsRes.json();
            const evolutions = await evolutionsRes.json();
            const execution = await executionRes.json();
            
            return {
                projects: stats.projects,
                tasks: stats.tasks,
                events: stats.events,
                evolutions: stats.evolutions,
                projectsDetail: projects,
                evolutionsTrend: evolutions,
                executionTimeTrend: execution
            };
        }
        
        // 更新 UI
        function updateUI(stats) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            // 更新统计卡片
            document.getElementById('totalProjects').textContent = stats.projects;
            document.getElementById('totalTasks').textContent = stats.tasks.total;
            document.getElementById('completionRate').textContent = 
                ((stats.tasks.completed / stats.tasks.total) * 100).toFixed(1) + '%';
            document.getElementById('totalEvolutions').textContent = stats.evolutions;
            
            // 更新趋势
            document.getElementById('tasksTrend').innerHTML = 
                `↑ 完成 ${stats.tasks.completed} 个`;
            document.getElementById('tasksTrend').className = 'trend up';
            
            // 更新图表
            updateTasksChart(stats.tasks);
            updateEvolutionsChart(stats.evolutionsTrend);
            updateExecutionTimeChart(stats.executionTimeTrend);
            updateProjectsChart(stats.projectsDetail);
            
            // 更新项目表格
            updateProjectsTable(stats.projectsDetail);
        }
        
        // 任务状态分布图
        function updateTasksChart(tasks) {
            const ctx = document.getElementById('tasksChart').getContext('2d');
            
            if (tasksChart) tasksChart.destroy();
            
            tasksChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['已完成', '进行中', '待处理'],
                    datasets: [{
                        data: [tasks.completed, tasks.in_progress, tasks.pending],
                        backgroundColor: ['#10b981', '#f59e0b', '#6b7280'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }
        
        // 进化趋势图
        function updateEvolutionsChart(trend) {
            const ctx = document.getElementById('evolutionsChart').getContext('2d');
            
            if (evolutionsChart) evolutionsChart.destroy();
            
            evolutionsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: trend.map(d => d.date.slice(5)),
                    datasets: [{
                        label: '进化次数',
                        data: trend.map(d => d.count),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }
        
        // 执行时间趋势图
        function updateExecutionTimeChart(trend) {
            const ctx = document.getElementById('executionTimeChart').getContext('2d');
            
            if (executionTimeChart) executionTimeChart.destroy();
            
            executionTimeChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: trend.map(d => d.date.slice(5)),
                    datasets: [{
                        label: '执行时间 (ms)',
                        data: trend.map(d => d.time),
                        backgroundColor: '#764ba2'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }
        
        // 项目任务完成度图
        function updateProjectsChart(projects) {
            const ctx = document.getElementById('projectsChart').getContext('2d');
            
            if (projectsChart) projectsChart.destroy();
            
            projectsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: projects.map(p => p.name),
                    datasets: [{
                        label: '已完成任务',
                        data: projects.map(p => p.completed),
                        backgroundColor: '#10b981'
                    }, {
                        label: '待完成任务',
                        data: projects.map(p => p.tasks - p.completed),
                        backgroundColor: '#e5e7eb'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    },
                    scales: {
                        x: {
                            stacked: true
                        },
                        y: {
                            stacked: true,
                            beginAtZero: true
                        }
                    }
                }
            });
        }
        
        // 更新项目表格
        function updateProjectsTable(projects) {
            const tbody = document.getElementById('projectsTableBody');
            tbody.innerHTML = projects.map(p => `
                <tr>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.description}</td>
                    <td>
                        <span class="status-badge status-${p.status}">
                            ${p.status === 'active' ? '🟢 运行中' : '⚪ 已暂停'}
                        </span>
                    </td>
                    <td style="width: 200px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${(p.completed / p.tasks * 100) || 0}%"></div>
                            </div>
                            <span>${p.completed}/${p.tasks}</span>
                        </div>
                    </td>
                    <td>${p.evolutions}</td>
                </tr>
            `).join('');
        }
        
        // 强制刷新缓存
        async function forceRefreshCache() {
            const btn = document.querySelector('.cache-btn');
            btn.classList.add('spinning');
            
            try {
                // 清除所有缓存
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                }
                
                // 清除 Service Worker 缓存
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(registrations.map(reg => reg.unregister()));
                }
                
                // 强制重新加载页面 (带时间戳参数绕过缓存)
                const timestamp = Date.now();
                const currentUrl = new URL(window.location.href);
                currentUrl.searchParams.set('_t', timestamp);
                window.location.href = currentUrl.toString();
            } catch (e) {
                console.error('清除缓存失败:', e);
                // 降级方案：直接刷新
                window.location.reload();
            }
        }
        
        // 硬重载 (完全不使用缓存)
        function hardReload() {
            window.location.reload(true);
        }
        
        // 页面加载时获取数据
        loadData();
        
        // 每 5 分钟自动刷新
        setInterval(loadData, 5 * 60 * 1000);
        
        // 监听键盘快捷键 (Ctrl+F5 / Cmd+Shift+R)
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'F5' || e.key === 'r')) {
                e.preventDefault();
                forceRefreshCache();
            }
        });
    </script>
</body>
</html>
