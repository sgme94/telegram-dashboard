<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>工作记录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
    .header h1 { font-size: 28px; margin-bottom: 10px; }
    .controls { display: flex; gap: 10px; padding: 20px; justify-content: center; flex-wrap: wrap; }
    .controls button { padding: 10px 20px; border: none; border-radius: 8px; background: #667eea; color: white; cursor: pointer; font-size: 14px; }
    .controls button:hover { background: #5568d3; }
    .content { padding: 20px; }
    .card { border: 1px solid #e9ecef; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card-header { margin-bottom: 15px; }
    .card-title { font-size: 18px; font-weight: 600; color: #2d3748; }
    .card-body { line-height: 1.8; color: #4a5568; }
    .card-body h3 { font-size: 16px; margin: 12px 0 8px; color: #667eea; }
    .card-body ul { margin-left: 20px; }
    .card-body li { margin: 5px 0; }
    .empty, .error { text-align: center; padding: 40px; color: #a0aec0; }
    .error { color: #e53e3e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📝 工作记录</h1>
      <p>每日工作总结与学习记录</p>
    </div>
    <div class="controls">
      <button onclick="renderSummaries()">🔄 刷新</button>
      <button onclick="showLatest()">📅 最新</button>
      <button onclick="toggleView()">👁️ 视图</button>
    </div>
    <div class="content" id="content"></div>
  </div>

  <script>
    // 内置数据（后续可替换为 API 调用）
    const summaries = [
      {
        date: '2026-03-04',
        content: `### ✅ 完成的任务
- 重新设计 Telegram 群组工作总结流程
- 创建 daily-summary-group.js 脚本（V3 简化版）
- 更新 HEARTBEAT.md 配置
- 清理小麦同步相关代码
- 更新 README 文档

### 📚 学习记录
- 学习了 OpenClaw message 工具的 Telegram 发送机制
- 掌握了 Windows Task Scheduler 配置方法
- 了解了消息截断处理（Telegram 4096 字符限制）`
      },
      {
        date: '2026-03-03',
        content: `### ✅ 完成的任务
- Telegram 任务看板 Canvas 页面开发
- 工作记录/进化记录/项目进度页面完成

### 📚 学习记录
- Canvas API 集成
- Telegram Web App 主题适配
- 深色模式自动切换`
      }
    ];

    let listView = true;

    function parseMarkdown(text) {
      if (!text) return '';
      return text
        .replace(/^### (.*$)/gm, '<h3>$1</h3>')
        .replace(/^## (.*$)/gm, '<h2>$1</h2>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/^- (.*$)/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        .replace(/<\/ul><ul>/g, '')
        .replace(/\n/g, '<br>');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '未知日期';
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }

    function formatRelativeDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const now = new Date();
      const diff = now - date;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      if (days === 0) return '今天';
      if (days === 1) return '昨天';
      if (days < 7) return `${days}天前`;
      return formatDate(dateStr);
    }

    function renderSummaries() {
      const content = document.getElementById('content');
      if (listView) {
        content.innerHTML = summaries.map(s => `
          <div class="card">
            <div class="card-header">
              <div class="card-title">${formatDate(s.date)}</div>
            </div>
            <div class="card-body">${parseMarkdown(s.content)}</div>
          </div>
        `).join('');
      } else {
        content.innerHTML = summaries.map(s => `
          <div class="card">
            <div class="card-header">
              <div class="card-title">${formatRelativeDate(s.date)}</div>
            </div>
            <div class="card-body">${(s.content).substring(0, 100)}...</div>
          </div>
        `).join('');
      }
    }

    function showLatest() {
      if (summaries.length > 0) {
        const content = document.getElementById('content');
        content.innerHTML = `
          <div class="card">
            <div class="card-header">
              <div class="card-title">${formatDate(summaries[0].date)}</div>
            </div>
            <div class="card-body">${parseMarkdown(summaries[0].content)}</div>
          </div>
        `;
      }
    }

    function toggleView() {
      listView = !listView;
      renderSummaries();
    }

    // 初始加载
    renderSummaries();
  </script>
</body>
</html>
