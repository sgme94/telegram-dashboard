<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>工作记录</title>
  <link rel="stylesheet" href="styles.css">
  <script src="utils.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📝 工作记录</h1>
      <p>每日工作总结与学习记录</p>
    </div>
    
    <div class="controls">
      <button onclick="loadSummaries()">🔄 刷新</button>
      <button onclick="showLatest()">📅 最新</button>
      <button onclick="toggleView()">👁️ 视图</button>
    </div>
    
    <div class="content" id="content">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p style="margin-top: 12px; color: var(--text-secondary);">加载中...</p>
      </div>
    </div>
  </div>
  
  <button 
    class="btn" 
    onclick="loadSummaries()" 
    style="position: fixed; bottom: 20px; right: 20px; border-radius: 50%; width: 56px; height: 56px; padding: 0; box-shadow: 0 4px 16px rgba(102,126,234,0.4);"
    title="刷新"
  >
    🔄
  </button>

  <script>
    const API_BASE = '/api';
    let summaries = [];
    let listView = true;
    
    // 初始化 Telegram Web App
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      
      // 应用 Telegram 主题
      const tg = window.Telegram.WebApp;
      if (tg.colorScheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
      
      // 设置头部颜色
      tg.setHeaderColor(tg.themeParams.secondary_bg_color || '#667eea');
    }
    
    // 检测系统深色模式
    function applyTheme() {
      if (window.CanvasUtils && window.CanvasUtils.isDarkMode()) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    }
    applyTheme();
    
    // 监听主题变化
    if (window.CanvasUtils) {
      window.CanvasUtils.onThemeChange((isDark) => {
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      });
    }
    
    // 加载工作记录
    async function loadSummaries() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p style="margin-top: 12px; color: var(--text-secondary);">加载中...</p></div>';
      
      try {
        const res = await fetch(API_BASE + '/summaries');
        if (!res.ok) throw new Error('加载失败');
        summaries = await res.json();
        
        if (!summaries || summaries.length === 0) {
          content.innerHTML = `
            <div class="empty">
              <div class="empty-icon">📭</div>
              <div class="empty-text">暂无工作记录<br>开始工作后会自动生成记录</div>
            </div>
          `;
          return;
        }
        
        renderSummaries();
      } catch (e) {
        content.innerHTML = `
          <div class="error">
            <div class="error-icon">⚠️</div>
            <p>加载失败：${e.message}</p>
            <p style="margin-top: 8px; font-size: 13px; color: var(--text-secondary);">请确保 API 服务器正在运行</p>
          </div>
        `;
      }
    }
    
    // 渲染工作记录
    function renderSummaries() {
      const content = document.getElementById('content');
      
      if (listView) {
        content.innerHTML = summaries.map(s => `
          <div class="card">
            <div class="card-header">
              <div class="card-title">${formatDate(s.date)}</div>
            </div>
            <div class="card-body">
              ${parseMarkdown(s.content || s.summary || '')}
            </div>
          </div>
        `).join('');
      } else {
        // 紧凑视图
        content.innerHTML = `
          <div class="stats-grid" style="margin-bottom: 16px;">
            <div class="stat-card">
              <div class="stat-value">${summaries.length}</div>
              <div class="stat-label">总记录数</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${calculateTotalHours()}</div>
              <div class="stat-label">总工时</div>
            </div>
          </div>
          ${summaries.map(s => `
            <div class="list-item">
              <div class="list-icon">📝</div>
              <div class="list-content">
                <div class="list-title">${formatRelativeDate(s.date)}</div>
                <div class="list-desc">${(s.content || s.summary || '').substring(0, 50)}...</div>
              </div>
            </div>
          `).join('')}
        `;
      }
    }
    
    // 格式化日期
    function formatDate(dateStr) {
      if (!dateStr) return '未知日期';
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long'
      });
    }
    
    // 相对日期
    function formatRelativeDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const now = new Date();
      const diff = now - date;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      
      if (days === 0) return '今天';
      if (days === 1) return '昨天';
      if (days < 7) return `${days}天前`;
      return formatDate(dateStr);
    }
    
    // 简单 Markdown 解析
    function parseMarkdown(text) {
      if (!text) return '';
      return text
        .replace(/^### (.*$)/gm, '<h3 style="font-size: 16px; margin: 12px 0 8px;">$1</h3>')
        .replace(/^## (.*$)/gm, '<h2 style="font-size: 18px; margin: 16px 0 10px;">$1</h2>')
        .replace(/^# (.*$)/gm, '<h1 style="font-size: 20px; margin: 20px 0 12px;">$1</h1>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/^- (.*$)/gm, '<li style="margin-left: 20px;">$1</li>')
        .replace(/\n/g, '<br>')
        .replace(/<\/li><br>/g, '</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul style="margin: 8px 0;">$1</ul>')
        .replace(/<\/ul><ul>/g, '');
    }
    
    // 计算总工时
    function calculateTotalHours() {
      // 简单估算：每条记录按 4 小时计算
      return summaries.length * 4;
    }
    
    // 显示最新
    function showLatest() {
      if (summaries.length > 0) {
        const content = document.getElementById('content');
        content.innerHTML = `
          <div class="card">
            <div class="card-header">
              <div class="card-title">${formatDate(summaries[0].date)}</div>
            </div>
            <div class="card-body">
              ${parseMarkdown(summaries[0].content || summaries[0].summary || '')}
            </div>
          </div>
        `;
      }
    }
    
    // 切换视图
    function toggleView() {
      listView = !listView;
      renderSummaries();
    }
    
    // 初始化下拉刷新
    if (window.CanvasUtils) {
      const content = document.getElementById('content');
      window.CanvasUtils.createPullToRefresh(document.querySelector('.container'), loadSummaries);
    }
    
    // 初始加载
    loadSummaries();
  </script>
</body>
</html>
