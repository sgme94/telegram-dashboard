<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目进度看板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 10px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      padding: 30px;
      background: #f8f9fa;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .stat-value { font-size: 32px; font-weight: bold; color: #f5576c; }
    .stat-label { font-size: 14px; color: #718096; margin-top: 5px; }
    .projects { padding: 30px; }
    .project-card {
      border: 1px solid #e9ecef;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .project-name { font-size: 18px; font-weight: 600; color: #2d3748; margin-bottom: 10px; }
    .progress-bar { height: 8px; background: #e9ecef; border-radius: 4px; overflow: hidden; margin: 10px 0; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #f093fb, #f5576c); }
    .progress-text { font-size: 12px; color: #718096; }
    .tasks { margin-top: 15px; }
    .task { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f7fafc; }
    .task:last-child { border-bottom: none; }
    .task-icon { margin-right: 10px; }
    .task-text { flex: 1; color: #4a5568; }
    .loading, .empty, .error { text-align: center; padding: 40px; }
    .loading { color: #f5576c; }
    .empty { color: #a0aec0; }
    .error { color: #e53e3e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 项目进度看板</h1>
      <p>任务追踪与进度统计</p>
    </div>
    <div class="stats" id="stats">
      <div class="stat-card"><div class="stat-value" id="totalTasks">-</div><div class="stat-label">总任务数</div></div>
      <div class="stat-card"><div class="stat-value" id="completedTasks">-</div><div class="stat-label">已完成</div></div>
      <div class="stat-card"><div class="stat-value" id="progressPercent">-</div><div class="stat-label">完成率</div></div>
      <div class="stat-card"><div class="stat-value" id="totalSummaries">-</div><div class="stat-label">工作记录</div></div>
    </div>
    <div class="projects" id="projects"><div class="loading">加载中...</div></div>
  </div>
  <script>
    const API_BASE = '/api';
    async function loadProgress() {
      try {
        const summariesRes = await fetch(API_BASE + '/summaries');
        const summaries = await summariesRes.json();
        const evolverRes = await fetch(API_BASE + '/evolver');
        const evolver = await evolverRes.json();
        const totalSummaries = summaries?.length || 0;
        const totalEvolver = evolver?.length || 0;
        const totalTasks = totalSummaries + totalEvolver;
        document.getElementById('totalTasks').textContent = totalTasks;
        document.getElementById('completedTasks').textContent = totalTasks;
        document.getElementById('progressPercent').textContent = totalTasks > 0 ? '100%' : '0%';
        document.getElementById('totalSummaries').textContent = totalSummaries;
        const projects = document.getElementById('projects');
        if (totalTasks === 0) {
          projects.innerHTML = '<div class="empty">暂无项目数据</div>';
          return;
        }
        projects.innerHTML = '<div class="project-card"><div class="project-name">📝 工作总结</div><div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div><div class="progress-text">' + totalSummaries + ' 条记录</div></div><div class="project-card"><div class="project-name">🧬 Evolver 进化</div><div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div><div class="progress-text">' + totalEvolver + ' 条记录</div></div>';
      } catch (e) {
        document.getElementById('projects').innerHTML = '<div class="error">加载失败：' + e.message + '</div>';
      }
    }
    loadProgress();
  </script>
</body>
</html>
