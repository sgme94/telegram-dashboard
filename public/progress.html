<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目进度看板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
    .header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 30px; text-align: center; }
    .header h1 { font-size: 28px; margin-bottom: 10px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 30px; background: #f8f9fa; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .stat-value { font-size: 32px; font-weight: bold; color: #f5576c; }
    .stat-label { font-size: 14px; color: #718096; margin-top: 5px; }
    .projects { padding: 30px; }
    .project-card { border: 1px solid #e9ecef; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .project-name { font-size: 18px; font-weight: 600; color: #2d3748; margin-bottom: 10px; }
    .progress-bar { height: 8px; background: #e9ecef; border-radius: 4px; overflow: hidden; margin: 10px 0; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #f093fb, #f5576c); }
    .progress-text { font-size: 12px; color: #718096; }
    .tasks { margin-top: 15px; }
    .task { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f7fafc; }
    .task:last-child { border-bottom: none; }
    .task-icon { margin-right: 10px; }
    .task-text { flex: 1; color: #4a5568; }
    .task-done { color: #48bb78; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 项目进度看板</h1>
      <p>任务追踪与进度统计</p>
    </div>
    <div class="stats" id="stats"></div>
    <div class="projects" id="projects"></div>
  </div>

  <script>
    // 内置数据
    const projects = [
      {
        name: '📝 工作总结系统',
        tasks: [
          { text: '重新设计 Telegram 群组总结流程', done: true },
          { text: '创建 daily-summary-group.js 脚本', done: true },
          { text: '更新 HEARTBEAT.md 配置', done: true },
          { text: '清理小麦同步代码', done: true }
        ]
      },
      {
        name: '🌐 Telegram 看板部署',
        tasks: [
          { text: '创建 Vercel 部署文件结构', done: true },
          { text: '配置 vercel.json', done: true },
          { text: '创建 README 部署指南', done: true },
          { text: '初始化 Git 仓库', done: true },
          { text: '推送到 GitHub', done: true },
          { text: '部署到 Vercel', done: true }
        ]
      },
      {
        name: '🧬 Evolver 进化系统',
        tasks: [
          { text: '工作流程优化', done: true },
          { text: 'Canvas 页面优化', done: true }
        ]
      }
    ];

    function calculateStats() {
      let total = 0, completed = 0;
      projects.forEach(p => {
        p.tasks.forEach(t => {
          total++;
          if (t.done) completed++;
        });
      });
      return { total, completed, percent: total > 0 ? Math.round((completed / total) * 100) : 0 };
    }

    function render() {
      const stats = calculateStats();
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-value">${stats.total}</div><div class="stat-label">总任务数</div></div>
        <div class="stat-card"><div class="stat-value">${stats.completed}</div><div class="stat-label">已完成</div></div>
        <div class="stat-card"><div class="stat-value">${stats.percent}%</div><div class="stat-label">完成率</div></div>
        <div class="stat-card"><div class="stat-value">${projects.length}</div><div class="stat-label">项目数</div></div>
      `;

      document.getElementById('projects').innerHTML = projects.map(p => {
        const done = p.tasks.filter(t => t.done).length;
        const percent = Math.round((done / p.tasks.length) * 100);
        return `
          <div class="project-card">
            <div class="project-name">${p.name}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
            <div class="progress-text">${done}/${p.tasks.length} 完成 (${percent}%)</div>
            <div class="tasks">
              ${p.tasks.map(t => `
                <div class="task">
                  <span class="task-icon">${t.done ? '✅' : '⏳'}</span>
                  <span class="task-text ${t.done ? 'task-done' : ''}">${t.text}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    render();
  </script>
</body>
</html>
